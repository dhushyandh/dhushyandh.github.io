<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Page not found on Dhushyandh portfolio">
    <title>404 | Dhushyandh</title>
    <link rel="icon" type="image/png" href="/images/favicon.png?v=2" sizes="32x32">
    <link rel="shortcut icon" href="/images/favicon.png?v=2">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/tailwind.config.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Ovo&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc;
            --card: rgba(255, 255, 255, 0.9);
            --text: #111827;
            --muted: #64748b;
            --primary: #b820e6;
            --secondary: #da7d20;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, rgba(184, 32, 230, 0.10), rgba(218, 125, 32, 0.10));
        }

        .font-Ovo {
            font-family: 'Ovo', serif;
        }
    </style>
</head>
<body class="min-h-screen overflow-x-hidden text-slate-900">
    <div class="absolute inset-0 -z-10 overflow-hidden">
        <div class="absolute -top-24 -left-20 h-72 w-72 rounded-full bg-fuchsia-400/20 blur-3xl"></div>
        <div class="absolute bottom-0 right-0 h-80 w-80 rounded-full bg-orange-400/20 blur-3xl"></div>
    </div>

    <main class="flex min-h-screen items-center justify-center px-5 py-16 sm:px-8 lg:px-12">
        <section class="w-full max-w-5xl overflow-hidden rounded-[32px] border border-slate-200/70 bg-white/80 shadow-[0_25px_80px_rgba(15,23,42,0.12)] backdrop-blur-xl">
            <div class="grid items-center gap-10 px-6 py-10 sm:px-10 lg:grid-cols-[1.1fr_0.9fr] lg:px-14 lg:py-14">
                <div>
                    <div class="mb-5 inline-flex items-center rounded-full border border-fuchsia-200 bg-fuchsia-50 px-4 py-2 text-sm font-semibold text-fuchsia-700">
                        404 • Page not found
                    </div>
                    <h1 class="font-Ovo text-4xl leading-tight text-slate-900 sm:text-5xl lg:text-6xl">
                        Oops! This page went missing.
                    </h1>
                    <p class="mt-5 max-w-xl text-lg leading-8 text-slate-600">
                        The link you opened doesn’t exist on my portfolio. It may be a typo, an old URL, or a page that moved.
                    </p>

                    <div class="mt-8 flex flex-wrap gap-3">
                        <a href="/" class="rounded-full bg-gradient-to-r from-[#b820e6] to-[#da7d20] px-6 py-3 text-sm font-semibold text-white shadow-lg transition hover:-translate-y-0.5">
                            Go to homepage
                        </a>
                        <a href="/#work" class="rounded-full border border-slate-300 bg-white px-6 py-3 text-sm font-semibold text-slate-700 transition hover:-translate-y-0.5 hover:border-slate-400">
                            See my projects
                        </a>
                    </div>

                    <div class="mt-8 rounded-2xl border border-slate-200 bg-slate-50/80 p-4 text-sm text-slate-600">
                        Broken URL: <span id="pathLabel" class="font-semibold text-slate-900"></span>
                    </div>
                </div>

                <div class="flex flex-col items-center justify-center rounded-[28px] bg-gradient-to-br from-[#fdf2f8] via-white to-[#fff7ed] p-6 shadow-inner sm:p-8">
                    <img src="/images/dhushy.png" alt="Dhushyandh profile" class="h-36 w-36 rounded-full border-4 border-white object-cover shadow-lg sm:h-44 sm:w-44">
                    <div class="mt-6 text-center">
                        <p class="font-Ovo text-2xl text-slate-800">Dhushyandh</p>
                        <p class="mt-2 text-sm uppercase tracking-[0.3em] text-slate-500">MERN stack developer</p>
                    </div>
                    <div class="mt-6 flex gap-3">
                        <span class="h-3 w-3 rounded-full bg-fuchsia-500"></span>
                        <span class="h-3 w-3 rounded-full bg-orange-500"></span>
                        <span class="h-3 w-3 rounded-full bg-slate-500"></span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const pathLabel = document.getElementById('pathLabel');
        if (pathLabel) {
            pathLabel.textContent = window.location.pathname || '/';
        }
    </script>
</body>
</html>
